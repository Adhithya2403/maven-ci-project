name: Maven CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Step 1: Download your code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    # Step 3: Verify Java version
    - name: Check Java Version
      run: java -version

    # Step 4: Build using Maven
    - name: Build Project
      run: mvn clean install

    # Step 5: Run Tests
      # (Already included in mvn install but shown separately if needed)

    # Step 6: Upload Artifact
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Built-JAR
        path: target/*.jar
